
<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0e0c0a;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: #e8e0d0;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(74,32,96,0.08) 0%, transparent 60%);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg-bubble { animation: fadeUp 0.25s ease forwards; }
  .persona-card { transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .persona-card:hover { transform: translateY(-2px); border-color: rgba(232,224,208,0.3) !important; }
  textarea:focus { outline: none; border-color: rgba(232,224,208,0.4) !important; }
  .end-btn:hover { background: rgba(220,50,50,0.2) !important; }
  .send-btn:hover { opacity: 0.85 !important; }
  .dl-btn:hover { background: rgba(74,160,74,0.2) !important; }
  #messages { flex: 1; overflow-y: auto; padding: 8px 4px; display: flex; flex-direction: column; gap: 12px; }
  #call-view { display: flex; flex-direction: column; height: calc(100vh - 73px); max-width: 760px; margin: 0 auto; padding: 24px 16px; }
</style>
</head>
<body>

<div id="header" style="border-bottom:1px solid rgba(232,224,208,0.1);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02)">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#8B1A1A,#4A2060);display:flex;align-items:center;justify-content:center;font-size:16px">🍷</div>
    <div>
      <div style="font-size:15px;font-weight:bold;letter-spacing:0.05em;color:#e8e0d0">FIP CALL TRACK</div>
      <div style="font-size:10px;color:rgba(232,224,208,0.4);letter-spacing:0.12em;text-transform:uppercase">Dormant Account Simulator</div>
    </div>
  </div>
  <div id="header-right"></div>
</div>

<div id="persona-select" style="max-width:900px;margin:0 auto;padding:48px 24px"></div>
<div id="call-view" style="display:none"></div>

<script>
const personas = [
  { id:1, name:"Marcus Webb", title:"Beverage Director", company:"The Barrel & Vine Group", dormantMonths:14, tag:"Switched Vendors", avatarColor:"#8B1A1A",
    backstory:"Upscale restaurant group with 4 locations. Switched to a competitor 14 months ago after being promised better allocated bourbon access. Slightly defensive but open to conversation.",
    systemPrompt:`You are Marcus Webb, Beverage Director for The Barrel & Vine Group, a 4-location upscale restaurant group. You went dormant as a client 14 months ago because you switched to a competing distributor (Premier Spirits Co.) who promised better access to allocated bourbons like Pappy Van Winkle and Buffalo Trace Antique Collection. You are slightly defensive about the switch but not hostile. You're professional and direct. You're somewhat open to reconsidering if the rep can offer something compelling about allocations or service. Don't be a pushover — make them work for it. Keep responses to 2-4 sentences, conversational, realistic. Never break character.`},
  { id:2, name:"Sofia Reyes", title:"Owner", company:"Cellar Door Wine Bar", dormantMonths:9, tag:"Business Changed", avatarColor:"#4A2060",
    backstory:"Small wine bar that pivoted to a bottle shop model during the pandemic and never fully switched back. Their ordering volume dropped 60% and they felt embarrassed to reach out.",
    systemPrompt:`You are Sofia Reyes, owner of Cellar Door Wine Bar, a small neighborhood wine bar that shifted heavily toward a retail bottle shop model 18 months ago. Your on-premise volume dropped significantly. You went dormant as a client because you felt a little embarrassed about your reduced order sizes and assumed the rep wouldn't want to service a smaller account. You're warm, a little apologetic, and actually happy someone called. You're open to reconnecting but need reassurance that small orders are okay. Keep responses to 2-4 sentences, conversational, realistic. Never break character.`},
  { id:3, name:"Derek Holtz", title:"General Manager", company:"Holtz Hospitality / The Rhine House", dormantMonths:11, tag:"Service Issue", avatarColor:"#1A3A2A",
    backstory:"German-inspired beer hall with a strong schnapps and spirits program. Had a bad experience with a missed delivery before Oktoberfest and never received a proper apology.",
    systemPrompt:`You are Derek Holtz, GM of The Rhine House, a German-inspired beer hall and restaurant with a strong spirits program. You stopped ordering 11 months ago after a distributor missed a critical delivery before your Oktoberfest event — you had to scramble and it was deeply embarrassing. No one ever called to apologize or make it right. You are frustrated but not irate. You want acknowledgment of what happened before you'll even consider moving forward. If the rep acknowledges the issue genuinely and offers something concrete, you'll soften. Keep responses to 2-4 sentences, conversational, realistic. Never break character.`},
  { id:4, name:"Tamara Fields", title:"Bar Manager", company:"Nightshade Cocktail Lounge", dormantMonths:7, tag:"Just Fell Off", avatarColor:"#2C2C5E",
    backstory:"Trendy cocktail bar focused on craft spirits. No bad experience — just got busy, the rep changed, and ordering habits shifted. Genuinely just fell through the cracks.",
    systemPrompt:`You are Tamara Fields, Bar Manager at Nightshade Cocktail Lounge, a trendy craft cocktail bar. You haven't ordered in about 7 months — not because of any bad experience, but because your rep changed, you got slammed with a renovation, and you just got out of the habit. You're friendly and a little sheepish about the gap. You're genuinely open to reconnecting and curious what's new in the portfolio. You might ask about new craft gins, mezcal, or Japanese whisky. Keep responses to 2-4 sentences, conversational, realistic. Never break character.`},
  { id:5, name:"Glen Murtagh", title:"Owner/Operator", company:"Murtagh's Pub & Whiskey Bar", dormantMonths:18, tag:"Not Sure / Vague", avatarColor:"#5C3A00",
    backstory:"Classic Irish pub with an extensive whiskey wall. The owner is older, not great with email, and genuinely doesn't remember why ordering stopped. Vague but friendly.",
    systemPrompt:`You are Glen Murtagh, owner of Murtagh's Pub & Whiskey Bar, a classic Irish pub with a large whiskey selection. You haven't ordered in about 18 months. You're genuinely not sure why — maybe your nephew who helped manage things moved away, maybe you just forgot, maybe you were trying a different supplier for a bit. You're warm, a little scattered, and not very tech-savvy. You're not defensive at all — you're actually glad someone called. You need the rep to guide the conversation. Keep responses to 2-4 sentences, conversational, realistic. Never break character.`}
];

let currentPersona = null;
let messages = [];
let callDuration = 0;
let timerInterval = null;
let callEnded = false;

function formatTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function renderPersonaSelect() {
  const el = document.getElementById('persona-select');
  el.innerHTML = `
    <div style="text-align:center;margin-bottom:48px">
      <div style="font-size:11px;letter-spacing:0.2em;color:rgba(232,224,208,0.4);text-transform:uppercase;margin-bottom:12px">Select a Dormant Account</div>
      <h1 style="font-size:28px;font-weight:normal;color:#e8e0d0;margin:0;letter-spacing:0.02em">Who are you calling today?</h1>
      <p style="color:rgba(232,224,208,0.45);margin-top:10px;font-size:14px">Each persona reflects a real dormancy scenario. Practice your reactivation pitch.</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px">
      ${personas.map(p => `
        <div class="persona-card" onclick="startCall(${p.id})" style="background:rgba(255,255,255,0.03);border:1px solid rgba(232,224,208,0.12);border-radius:10px;padding:24px;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,${p.avatarColor},transparent)"></div>
          <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px">
            <div style="width:46px;height:46px;border-radius:50%;background:${p.avatarColor};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#fff;flex-shrink:0">${p.name.split(' ').map(n=>n[0]).join('')}</div>
            <div>
              <div style="font-weight:bold;font-size:15px;color:#e8e0d0">${p.name}</div>
              <div style="font-size:12px;color:rgba(232,224,208,0.5);margin-top:2px">${p.title}</div>
              <div style="font-size:12px;color:rgba(232,224,208,0.4)">${p.company}</div>
            </div>
          </div>
          <div style="display:inline-block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:12px;background:${p.avatarColor}33;border:1px solid ${p.avatarColor}66;color:#e8e0d0">${p.tag}</div>
          <p style="font-size:13px;color:rgba(232,224,208,0.5);margin:0;line-height:1.6">${p.backstory}</p>
          <div style="margin-top:16px;font-size:11px;color:rgba(232,224,208,0.3);letter-spacing:0.06em">DORMANT · ${p.dormantMonths} MONTHS</div>
        </div>
      `).join('')}
    </div>`;
}

function updateHeaderRight() {
  const el = document.getElementById('header-right');
  if (!currentPersona) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:16px">
      ${!callEnded ? `<div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite"></div><span id="timer-display" style="font-size:13px;font-variant-numeric:tabular-nums;color:#4ade80;letter-spacing:0.08em">${formatTime(callDuration)}</span></div>` : `<span style="font-size:12px;color:rgba(232,224,208,0.4);letter-spacing:0.08em">CALL ENDED · ${formatTime(callDuration)}</span>`}
      <button onclick="goBack()" style="background:none;border:1px solid rgba(232,224,208,0.2);color:rgba(232,224,208,0.6);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;letter-spacing:0.06em;font-family:Georgia,serif">← PERSONAS</button>
    </div>`;
}

function renderCallView() {
  const cv = document.getElementById('call-view');
  cv.innerHTML = `
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(232,224,208,0.1);border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px">
      <div style="width:44px;height:44px;border-radius:50%;background:${currentPersona.avatarColor};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#fff;flex-shrink:0">${currentPersona.name.split(' ').map(n=>n[0]).join('')}</div>
      <div style="flex:1">
        <div style="font-weight:bold;font-size:15px">${currentPersona.name} <span style="font-weight:normal;color:rgba(232,224,208,0.5);font-size:13px">— ${currentPersona.title}</span></div>
        <div style="font-size:12px;color:rgba(232,224,208,0.45)">${currentPersona.company}</div>
      </div>
      <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;background:${currentPersona.avatarColor}33;border:1px solid ${currentPersona.avatarColor}55;color:#e8e0d0">${currentPersona.tag}</div>
      <button id="end-btn" class="end-btn" onclick="endCall()" style="background:rgba(220,50,50,0.1);border:1px solid rgba(220,50,50,0.4);color:#f87171;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:0.06em;transition:background 0.2s;font-family:Georgia,serif">END CALL</button>
    </div>
    <div id="messages"></div>
    <div id="input-area" style="margin-top:12px;display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,0.03);border:1px solid rgba(232,224,208,0.1);border-radius:10px;padding:12px">
      <textarea id="user-input" placeholder="Type your response... (Enter to send)" rows="2" style="flex:1;background:none;border:1px solid rgba(232,224,208,0.15);border-radius:6px;padding:10px 14px;color:#e8e0d0;font-size:14px;resize:none;font-family:Georgia,serif;line-height:1.5;transition:border-color 0.2s"></textarea>
      <button class="send-btn" onclick="sendMessage()" style="background:linear-gradient(135deg,#8B1A1A,#6B1A5A);border:none;color:#fff;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;letter-spacing:0.06em;font-family:Georgia,serif;min-width:70px;transition:opacity 0.2s">SEND</button>
    </div>
    <div id="post-call-actions" style="display:none;text-align:center;padding:16px 0;display:none;gap:12px;justify-content:center"></div>`;

  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

function appendMessage(role, text) {
  const container = document.getElementById('messages');
  const firstName = currentPersona.name.split(' ')[0].toUpperCase();
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = 'msg-bubble';
  div.style.cssText = `display:flex;flex-direction:column;align-items:${isUser ? 'flex-end' : 'flex-start'}`;
  div.innerHTML = `
    <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,224,208,0.3);margin-bottom:4px;${isUser ? 'padding-right:4px' : 'padding-left:4px'}">${isUser ? 'YOU' : firstName}</div>
    <div style="max-width:78%;padding:12px 16px;border-radius:${isUser ? '12px 12px 4px 12px' : '12px 12px 12px 4px'};background:${isUser ? 'rgba(139,26,26,0.35)' : 'rgba(255,255,255,0.06)'};border:1px solid ${isUser ? 'rgba(139,26,26,0.4)' : 'rgba(232,224,208,0.1)'};font-size:14px;line-height:1.65;color:#e8e0d0">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function appendTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.style.cssText = 'display:flex;align-items:flex-start;gap:8px';
  div.innerHTML = `<div style="padding:12px 18px;border-radius:12px 12px 12px 4px;background:rgba(255,255,255,0.04);border:1px solid rgba(232,224,208,0.08);display:flex;gap:5px;align-items:center">${[0,1,2].map(n=>`<div style="width:6px;height:6px;border-radius:50%;background:rgba(232,224,208,0.4);animation:pulse 1.2s ${n*0.2}s infinite"></div>`).join('')}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function callAPI(userContent) {
  const history = messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
  if (userContent) history.push({ role: 'user', content: userContent });
  const isFirst = messages.length === 0;
  const systemExtra = isFirst ? ' Start the call by answering the phone naturally — say hello with mild curiosity about who\'s calling.' : '';

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: currentPersona.systemPrompt + systemExtra,
      messages: isFirst ? [{ role: 'user', content: '[The phone starts ringing and they pick up]' }] : history
    })
  });
  const data = await res.json();
  return data.content?.map(b => b.text).join('') || '...';
}

let isSending = false;

async function startCall(id) {
  currentPersona = personas.find(p => p.id === id);
  messages = [];
  callDuration = 0;
  callEnded = false;
  isSending = true;

  document.getElementById('persona-select').style.display = 'none';
  const cv = document.getElementById('call-view');
  cv.style.display = 'flex';
  cv.style.flexDirection = 'column';
  renderCallView();
  updateHeaderRight();

  timerInterval = setInterval(() => {
    callDuration++;
    const td = document.getElementById('timer-display');
    if (td) td.textContent = formatTime(callDuration);
  }, 1000);

  appendTyping();
  try {
    const reply = await callAPI(null);
    removeTyping();
    messages.push({ role: 'client', text: reply });
    appendMessage('client', reply);
  } catch {
    removeTyping();
    messages.push({ role: 'client', text: 'Hello?' });
    appendMessage('client', 'Hello?');
  }
  isSending = false;
  document.getElementById('user-input')?.focus();
}

async function sendMessage() {
  if (isSending || callEnded) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  isSending = true;

  messages.push({ role: 'user', text });
  appendMessage('user', text);
  appendTyping();

  try {
    const reply = await callAPI(text);
    removeTyping();
    messages.push({ role: 'client', text: reply });
    appendMessage('client', reply);
  } catch {
    removeTyping();
    messages.push({ role: 'client', text: "Sorry, I lost you for a second — can you repeat that?" });
    appendMessage('client', "Sorry, I lost you for a second — can you repeat that?");
  }
  isSending = false;
  input.focus();
}

function endCall() {
  callEnded = true;
  clearInterval(timerInterval);
  updateHeaderRight();

  document.getElementById('end-btn').style.display = 'none';
  document.getElementById('input-area').style.display = 'none';

  const messagesEl = document.getElementById('messages');
  const endDiv = document.createElement('div');
  endDiv.style.cssText = 'text-align:center;padding:24px;color:rgba(232,224,208,0.35);font-size:13px;letter-spacing:0.08em';
  endDiv.textContent = `— CALL ENDED · ${formatTime(callDuration)} —`;
  messagesEl.appendChild(endDiv);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  const actions = document.getElementById('post-call-actions');
  actions.style.display = 'flex';
  actions.innerHTML = `
    <button class="dl-btn" onclick="downloadTranscript()" style="background:rgba(74,160,74,0.1);border:1px solid rgba(74,160,74,0.4);color:#86efac;padding:9px 20px;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:0.06em;transition:background 0.2s;font-family:Georgia,serif;display:flex;align-items:center;gap:8px">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="#86efac" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      DOWNLOAD TRANSCRIPT
    </button>
    <button onclick="goBack()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(232,224,208,0.2);color:#e8e0d0;padding:9px 20px;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:0.06em;font-family:Georgia,serif">← NEW PERSONA</button>`;
}

function downloadTranscript() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  const duration = formatTime(callDuration);

  let txt = `FIP CALL TRACK — CALL TRANSCRIPT\n`;
  txt += `${'='.repeat(50)}\n\n`;
  txt += `Date:           ${dateStr} at ${timeStr}\n`;
  txt += `Duration:       ${duration}\n`;
  txt += `Client:         ${currentPersona.name}\n`;
  txt += `Title:          ${currentPersona.title}\n`;
  txt += `Company:        ${currentPersona.company}\n`;
  txt += `Dormancy Reason: ${currentPersona.tag}\n`;
  txt += `Dormant:        ${currentPersona.dormantMonths} months\n`;
  txt += `\n${'='.repeat(50)}\n\n`;
  txt += `CONVERSATION\n\n`;

  messages.forEach(m => {
    const speaker = m.role === 'user' ? 'REP' : currentPersona.name.toUpperCase();
    const lines = m.text.match(/.{1,70}(\s|$)/g) || [m.text];
    txt += `[${speaker}]\n${lines.join('\n').trim()}\n\n`;
  });

  txt += `${'='.repeat(50)}\n`;
  txt += `END OF TRANSCRIPT\n`;
  txt += `Generated by FIP Call Track Simulator\n`;

  const blob = new Blob([txt], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = currentPersona.name.replace(/\s+/g, '_').toLowerCase();
  a.href = url;
  a.download = `fip_transcript_${safeName}_${now.toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function goBack() {
  clearInterval(timerInterval);
  currentPersona = null;
  messages = [];
  callDuration = 0;
  callEnded = false;
  isSending = false;
  document.getElementById('call-view').style.display = 'none';
  document.getElementById('persona-select').style.display = 'block';
  updateHeaderRight();
}

renderPersonaSelect();
</script>
</body>
</html>
